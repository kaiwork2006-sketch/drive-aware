<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />
  <title>DriveAware Live</title>

  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDwlPdQ7vByL3E1VlmSb3Xhq0acYuC8590" defer></script>

  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: Arial, sans-serif;
      background: #000;
      color: #fff;
      overflow: hidden;
    }

    #loginScreen, #mapScreen {
      width: 100%;
      height: 100%;
    }

    #loginScreen {
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at top, rgba(59,130,246,0.18), transparent 35%),
        radial-gradient(circle at bottom, rgba(255,255,255,0.08), transparent 25%),
        #000;
      padding: 20px;
    }

    .login-card {
      width: 100%;
      max-width: 460px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 28px;
      padding: 32px 24px;
      text-align: center;
      backdrop-filter: blur(12px);
    }

    .logo {
      font-size: 34px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .subtitle {
      color: rgba(255,255,255,0.72);
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 26px;
    }

    #mapScreen {
      display: none;
      position: relative;
      background: #000;
    }

    #map {
      width: 100%;
      height: 100%;
    }

    .hud-top {
      position: absolute;
      top: 18px;
      left: 18px;
      right: 18px;
      display: flex;
      justify-content: space-between;
      z-index: 10;
      pointer-events: none;
    }

    .title-box,
    .status-box,
    .speed-box,
    .hud-bottom {
      background: rgba(0,0,0,0.68);
      border: 1px solid rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0,0,0,0.35);
      pointer-events: auto;
    }

    .title-box {
      padding: 14px 16px;
      border-radius: 18px;
    }

    .title-box h1 {
      font-size: 18px;
      margin: 0 0 4px 0;
    }

    .title-box p {
      margin: 0;
      color: rgba(255,255,255,0.68);
      font-size: 13px;
    }

    .status-box {
      padding: 12px 14px;
      border-radius: 18px;
      text-align: right;
      min-width: 170px;
    }

    .status-live {
      color: #4ade80;
      font-weight: 700;
      font-size: 14px;
      margin-bottom: 6px;
    }

    .speed-box {
      position: absolute;
      top: 92px;
      left: 18px;
      z-index: 10;
      border-radius: 18px;
      padding: 14px 16px;
      min-width: 105px;
    }

    .speed-label {
      font-size: 12px;
      color: rgba(255,255,255,0.62);
      margin-bottom: 4px;
    }

    .speed-value {
      font-size: 28px;
      font-weight: 700;
      line-height: 1;
    }

    .speed-unit {
      font-size: 12px;
      color: rgba(255,255,255,0.62);
      margin-top: 6px;
    }

    .hud-bottom {
      position: absolute;
      left: 18px;
      bottom: 18px;
      z-index: 10;
      border-radius: 22px;
      padding: 16px;
      width: min(350px, calc(100vw - 36px));
    }

    .hud-bottom h2 {
      margin: 0 0 12px 0;
      font-size: 16px;
    }

    .hud-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .hud-item {
      background: rgba(255,255,255,0.05);
      border-radius: 14px;
      padding: 10px 12px;
    }

    .hud-item-label {
      font-size: 11px;
      color: rgba(255,255,255,0.6);
      margin-bottom: 4px;
    }

    .hud-item-value {
      font-size: 15px;
      font-weight: 700;
    }
  </style>
</head>
<body>
  <div id="loginScreen">
    <div class="login-card">
      <div class="logo">🚗 DriveAware</div>
      <div class="subtitle">
        Sign in and see real nearby users within 2 km.
      </div>

      <div
        id="g_id_onload"
        data-client_id="858177640880-1cpig47vu2utd3rvoo1n4r2ioqto3mar.apps.googleusercontent.com"
        data-callback="handleCredentialResponse"
        data-auto_prompt="false"
      ></div>

      <div class="g_id_signin"></div>
    </div>
  </div>

  <div id="mapScreen">
    <div id="map"></div>

    <div class="hud-top">
      <div class="title-box">
        <h1>DriveAware</h1>
        <p>Live nearby vehicle network</p>
      </div>

      <div class="status-box">
        <div class="status-live">● LIVE</div>
        <div id="statusText">Connecting users...</div>
      </div>
    </div>

    <div class="speed-box">
      <div class="speed-label">Your speed</div>
      <div class="speed-value" id="speedValue">0</div>
      <div class="speed-unit">km/h</div>
    </div>

    <div class="hud-bottom">
      <h2>Nearby vehicles</h2>

      <div class="hud-grid">
        <div class="hud-item">
          <div class="hud-item-label">Range</div>
          <div class="hud-item-value">2 km</div>
        </div>

        <div class="hud-item">
          <div class="hud-item-label">Refresh</div>
          <div class="hud-item-value">5 sec</div>
        </div>

        <div class="hud-item">
          <div class="hud-item-label">Nearby cars</div>
          <div class="hud-item-value" id="carCount">0</div>
        </div>

        <div class="hud-item">
          <div class="hud-item-label">Mode</div>
          <div class="hud-item-value">Real users</div>
        </div>
      </div>
    </div>
  </div>

  <script>
    let map;
    let userMarker;
    let nearbyMarkers = [];
    let radiusCircle;
    let userId = "user_" + Math.random().toString(36).slice(2, 10);
    let userLocation = null;
    let simulatedSpeed = 0;
    let fixedZoom = 15.8;

    function teslaRoadStyle() {
      return [
        { elementType: "geometry", stylers: [{ color: "#05070b" }] },
        { elementType: "labels.text.fill", stylers: [{ color: "#6b7280" }] },
        { elementType: "labels.text.stroke", stylers: [{ color: "#05070b" }] },
        { featureType: "poi", stylers: [{ visibility: "off" }] },
        { featureType: "transit", stylers: [{ visibility: "off" }] },
        { featureType: "administrative", stylers: [{ visibility: "off" }] },
        { featureType: "road", elementType: "geometry", stylers: [{ color: "#1f2937" }] },
        { featureType: "road.highway", elementType: "geometry", stylers: [{ color: "#374151" }] },
        { featureType: "water", elementType: "geometry", stylers: [{ color: "#030712" }] },
        { featureType: "landscape", elementType: "geometry", stylers: [{ color: "#05070b" }] }
      ];
    }

    function getTeslaCarIcon(fillColor = "#ffffff", strokeColor = "#111111", size = 40) {
      return {
        url:
          "data:image/svg+xml;charset=UTF-8," +
          encodeURIComponent(`
            <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
              <g>
                <path d="M20 18 C22 14, 42 14, 44 18 L48 28 C49 30, 49 34, 48 37 L46 46 C45.5 49, 43 51, 40 51 L24 51 C21 51, 18.5 49, 18 46 L16 37 C15 34, 15 30, 16 28 Z"
                  fill="${fillColor}" stroke="${strokeColor}" stroke-width="2"/>
                <path d="M23 22 L41 22 L45 31 L19 31 Z" fill="#1f2937"/>
                <rect x="22" y="34" width="20" height="8" rx="3" fill="#dbe4ee"/>
                <circle cx="22" cy="46" r="3.2" fill="#0f0f0f"/>
                <circle cx="42" cy="46" r="3.2" fill="#0f0f0f"/>
              </g>
            </svg>
          `),
        scaledSize: new google.maps.Size(size, size),
        anchor: new google.maps.Point(size / 2, size / 2)
      };
    }

    function handleCredentialResponse() {
      document.getElementById("loginScreen").style.display = "none";
      document.getElementById("mapScreen").style.display = "block";
      initMap();
    }

    function kmhFromMetersPerSecond(mps) {
      return Math.round(mps * 3.6);
    }

    function updateSpeedBox(value) {
      document.getElementById("speedValue").innerText = value;
    }

    function initMap() {
      if (!navigator.geolocation) {
        alert("Geolocation not supported.");
        return;
      }
      
       startLiveTracking(map);
      navigator.geolocation.getCurrentPosition(
        (position) => {
          userLocation = {
            lat: position.coords.latitude,
            lng: position.coords.longitude
          };

          if (position.coords.speed !== null && !isNaN(position.coords.speed)) {
            simulatedSpeed = kmhFromMetersPerSecond(position.coords.speed);
          } else {
            simulatedSpeed = 48;
          }

          updateSpeedBox(simulatedSpeed);

          map = new google.maps.Map(document.getElementById("map"), {
            center: userLocation,
            zoom: fixedZoom,
            disableDefaultUI: true,
            clickableIcons: false,
            zoomControl: false,
            gestureHandling: "greedy",
            styles: teslaRoadStyle()
          });

          userMarker = new google.maps.Marker({
            position: userLocation,
            map: map,
            title: "Your Car",
            icon: getTeslaCarIcon("#ffffff", "#2563eb", 44),
            zIndex: 1000
          });

          radiusCircle = new google.maps.Circle({
            map: map,
            center: userLocation,
            radius: 2000,
            strokeColor: "#3b82f6",
            strokeOpacity: 0.7,
            strokeWeight: 1.4,
            fillColor: "#2563eb",
            fillOpacity: 0.12
          });

          sendMyLocation();
          fetchNearbyUsers();
          startLiveTracking();
        },
        () => {
          alert("Location permission denied.");
        },
        {
          enableHighAccuracy: true,
          timeout: 10000,
          maximumAge: 0
        }
      );
    }

    function clearNearbyMarkers() {
      nearbyMarkers.forEach((marker) => marker.setMap(null));
      nearbyMarkers = [];
    }

    function renderNearbyUsers(users) {
      clearNearbyMarkers();

      users.forEach((user) => {
        const marker = new google.maps.Marker({
          position: { lat: user.lat, lng: user.lng },
          map: map,
          title: "Nearby Car",
          icon: getTeslaCarIcon("#d1d5db", "#000000", 30)
        });

        const infoWindow = new google.maps.InfoWindow({
          content: `<b>Nearby Car</b><br>Speed: ${Math.round(user.speed || 0)} km/h<br>Distance: ${user.distanceKm} km`
        });

        marker.addListener("click", () => {
          infoWindow.open(map, marker);
        });

        nearbyMarkers.push(marker);
      });

      document.getElementById("carCount").innerText = users.length;
    }

    async function sendMyLocation() {
      if (!userLocation) return;

      try {
        await fetch("/api/update-location", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify({
            userId,
            lat: userLocation.lat,
            lng: userLocation.lng,
            speed: simulatedSpeed
          })
        });

        document.getElementById("statusText").innerText = "Location shared";
      } catch (error) {
        document.getElementById("statusText").innerText = "Server offline";
      }
    }

    async function fetchNearbyUsers() {
      if (!userLocation) return;

      try {
        const response = await fetch(
          `/api/nearby?userId=${encodeURIComponent(userId)}&lat=${userLocation.lat}&lng=${userLocation.lng}`
        );

        const data = await response.json();
        renderNearbyUsers(data.users || []);
        document.getElementById("statusText").innerText = "Nearby users updated";
      } catch (error) {
        document.getElementById("statusText").innerText = "Could not load users";
      }
    }

    function startLiveTracking() {
      navigator.geolocation.watchPosition(
        (position) => {
          userLocation = {
            lat: position.coords.latitude,
            lng: position.coords.longitude
          };

          if (position.coords.speed !== null && !isNaN(position.coords.speed)) {
            simulatedSpeed = kmhFromMetersPerSecond(position.coords.speed);
          }

          updateSpeedBox(simulatedSpeed);

          userMarker.setPosition(userLocation);
          radiusCircle.setCenter(userLocation);
          map.panTo(userLocation);

          sendMyLocation();
        },
        () => {},
        {
          enableHighAccuracy: true,
          timeout: 10000,
          maximumAge: 2000
        }
      );

      setInterval(() => {
        sendMyLocation();
        fetchNearbyUsers();
      }, 5000);
    }
    <script>
const BACKEND_URL = "https://drive-aware-backend.onrender.com";

let myId = localStorage.getItem("driveaware_id");
if (!myId) {
  myId = "user_" + Math.random().toString(36).substring(2, 10);
  localStorage.setItem("driveaware_id", myId);
}

let nearbyMarkers = [];

function clearNearbyMarkers() {
  nearbyMarkers.forEach(marker => marker.setMap(null));
  nearbyMarkers = [];
}

async function sendLocation(lat, lng, speed = 0) {
  await fetch(`${BACKEND_URL}/update-location`, {
    method: "POST",
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      id: myId,
      lat,
      lng,
      speed,
      vehicleType: "car"
    })
  });
}

async function getNearby(lat, lng) {
  const res = await fetch(`${BACKEND_URL}/nearby?lat=${lat}&lng=${lng}&range=2&id=${myId}`);
  return await res.json();
}

async function updateNearbyCars(map, lat, lng) {
  const users = await getNearby(lat, lng);
  clearNearbyMarkers();

  users.forEach((u) => {
    const marker = new google.maps.Marker({
      position: { lat: u.lat, lng: u.lng },
      map,
      icon: "/car-icon.png"
    });
    nearbyMarkers.push(marker);
  });

  const nearbyCountBox = document.getElementById("nearby-count");
  if (nearbyCountBox) {
    nearbyCountBox.textContent = users.length;
  }
}

function startLiveTracking(map) {
  setInterval(() => {
    navigator.geolocation.getCurrentPosition(async (pos) => {
      const lat = pos.coords.latitude;
      const lng = pos.coords.longitude;
      const speed = pos.coords.speed || 0;

      await sendLocation(lat, lng, speed);
      await updateNearbyCars(map, lat, lng);
    });
  }, 5000);
}
    </script>
