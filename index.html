<html>
<head>
  <title>DriveAware</title>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyDqeHWriYqHallFf6zm3NNcz3Nyv7Md1tQ"></script>

  <style>
    body { margin:0; font-family:Arial; }
    #map { height:100vh; width:100%; display:none; }
    #login { text-align:center; margin-top:100px; }
  </style>

</head>

<body>

<div id="login">
  <h1>DriveAware</h1>
  <div id="g_id_onload"
       data-client_id="858177640880-1cpig47vu2utd3rvoo1n4r2ioqto3mar.apps.googleusercontent.com"
       data-callback="handleCredentialResponse">
  </div>

  <div class="g_id_signin"></div>
</div>

<div id="map"></div>

<script>
function handleCredentialResponse(response) {
  document.getElementById("login").style.display = "none";
  document.getElementById("map").style.display = "block";

  initMap();
}

function initMap() {
  navigator.geolocation.getCurrentPosition((position) => {
    const userLocation = {
      lat: position.coords.latitude,
      lng: position.coords.longitude
    };

    const map = new google.maps.Map(document.getElementById("map"), {
      center: userLocation,
      zoom: 15
    });

    new google.maps.Marker({
      position: userLocation,
      map: map,
      title: "You"
    });
  });
}
</script>

</body>
